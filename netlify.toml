# ─────────────────────────────────────────────────────────
# Netlify configuration for Oracle Quant v8
#
# This is a zero-build, single-file HTML app.
# Netlify settings to use when connecting this repo:
#
#   Base directory  : (leave blank)
#   Build command   : (leave blank)
#   Publish directory: .
#   Functions dir   : (leave blank)
# ─────────────────────────────────────────────────────────

[build]
  # No base directory — repo root is the project root
  # No build command — index.html is pre-built static HTML
  publish = "."   # publish the root directory where index.html is located

# ── Security / performance headers ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"

# ── SPA / single-page-app fallback ───────────────────────
# Ensures index.html is served for all routes (future-proofing).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
