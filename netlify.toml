# Netlify Configuration

## Privacy Headers Configuration

# Removing privacy-blocking headers and allowing public access:
# Replace the security headers with permissive settings for development:

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(self)"

# Setup localStorage API Key:
#  1. Obtain your API key from the Netlify UI.
#  2. Store it securely in localStorage:
# localStorage.setItem('api_key', 'YOUR_API_KEY');

# Build Configuration
[build]
  publish = "public"
  command = "npm run build"

# Redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
